<h1>Результати пошуку для: "{{ query }}"</h1>

{% for article in results %}
    <h2><a href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h2>
    <p>{{ article.text|truncatewords:20 }}</p>
{% empty %}
    <p>Нічого не знайдено за вашим запитом.</p>
{% endfor %}

<a href="{% url 'article_list' %}">Назад до всіх статей</a>
